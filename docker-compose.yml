version: '3.8'

services:
  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  tachriat-app:
    build: .
    ports:
      - "8017:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/maarefa_agent
      - MONGODB_DB_NAME=maarefa_agent
      - EMBEDDING_MODEL_TYPE=azure_openai
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    networks:
      - app-network
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: 