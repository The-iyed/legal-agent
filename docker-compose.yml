version: '3.8'

services:
  mongodb:
    image: mongo:latest
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network

  tachriat-app:
    build: .
    ports:
      - "8017:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/maarefa_agent
      - MONGODB_DB_NAME=maarefa_agent
      - AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=https://momah-docai-westeurope.cognitiveservices.azure.com/
      - AZURE_DOCUMENT_INTELLIGENCE_API_KEY=DTpywr9ybH8yx2uJc0tug3iUuWxKslDA0mGltS0z29qLBpoxlDzFJQQJ99BEAC5RqLJXJ3w3AAALACOGuSSr
      - AZURE_STORAGE_CONTAINER_NAME=leg-files
      - EMBEDDING_MODEL_TYPE=azure_openai
    depends_on:
      - mongodb
    networks:
      - app-network
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data: 